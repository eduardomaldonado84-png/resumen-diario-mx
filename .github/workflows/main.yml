name: Ejecucion Diaria Resumen
on:
  schedule:
    - cron: '0 14 * * *' # 8:00 AM hora CDMX (14:00 UTC)
  workflow_dispatch: # Botón para probarlo manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3
      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Instalar Librerias
        run: pip install requests
      - name: Correr Script
        env:
          BANXICO_TOKEN: ${{ secrets.BANXICO_TOKEN }}
          NEWS_KEY: ${{ secrets.NEWS_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_mexico.py
